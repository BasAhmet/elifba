<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elif Ba - Harflerin Birleşimi</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f0f4f8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  .game-container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  .question-box {
    margin-bottom: 20px;
  }
  .main-letter {
    font-size: 5rem;
    color: #2c3e50;
    margin: 10px 0;
  }
  .instruction {
    font-size: 1.2rem;
    color: #e74c3c;
    font-weight: bold;
  }
  .options {
    display: flex;
    justify-content: space-around;
    gap: 15px;
    flex-direction: row-reverse; /* Arapça sağdan sola olduğu için */
  }
  .option {
    font-size: 3rem;
    background: #ecf0f1;
    border: 2px solid #bdc3c7;
    border-radius: 10px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }
  .option:hover {
    background: #d5dbdb;
  }
  .correct {
    background: #2ecc71 !important;
    color: white;
    border-color: #27ae60 !important;
  }
  .wrong {
    background: #e74c3c !important;
    color: white;
    border-color: #c0392b !important;
    animation: shake 0.4s;
  }
  @keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
  }
  #score-board {
    margin-top: 20px;
    font-size: 1.1rem;
    color: #7f8c8d;
  }
</style>
</head>
<body>

<div class="game-container">
  <div class="question-box">
    <div id="mainLetter" class="main-letter">ب</div>
    <div id="instruction" class="instruction">BAŞTA nasıl yazılır?</div>
  </div>
  
  <div class="options" id="optionsContainer">
    <!-- Butonlar JavaScript ile buraya gelecek -->
  </div>

  <div id="score-board">Skor: <span id="score">0</span> / 3</div>
</div>

<script>
  const levels = [
    {
      letter: "ب",
      instruction: "BAŞTA nasıl yazılır?",
      correct: "بـ",
      options: ["ـب", "ـبـ", "بـ"]
    },
    {
      letter: "ج",
      instruction: "ORTADA nasıl yazılır?",
      correct: "ـجـ",
      options: ["جـ", "ـجـ", "ـج"]
    },
    {
      letter: "ع",
      instruction: "SONDA nasıl yazılır?",
      correct: "ـع",
      options: ["ـع", "ـعـ", "عـ"]
    }
  ];

  let currentLevel = 0;
  let score = 0;

  function loadLevel() {
    if (currentLevel >= levels.length) {
      document.querySelector('.game-container').innerHTML = `<h2>Tebrikler! 🎉</h2><p>Bölümü tamamladın. Toplam Skorun: ${score}</p>`;
      return;
    }

    const levelData = levels[currentLevel];
    document.getElementById('mainLetter').innerText = levelData.letter;
    document.getElementById('instruction').innerText = levelData.instruction;
    
    const optionsContainer = document.getElementById('optionsContainer');
    optionsContainer.innerHTML = '';

    // Şıkları karıştırarak ekleyelim
    const shuffledOptions = levelData.options.sort(() => Math.random() - 0.5);

    shuffledOptions.forEach(opt => {
      const btn = document.createElement('div');
      btn.className = 'option';
      btn.innerText = opt;
      btn.onclick = () => checkAnswer(btn, opt, levelData.correct);
      optionsContainer.appendChild(btn);
    });
  }

  function checkAnswer(btn, selected, correct) {
    // Aynı anda birden fazla tıklamayı önlemek için diğer butonları pasif yap
    const allBtns = document.querySelectorAll('.option');
    allBtns.forEach(b => b.style.pointerEvents = 'none');

    if (selected === correct) {
      btn.classList.add('correct');
      score += 10;
      document.getElementById('score').innerText = score;
      setTimeout(() => {
        currentLevel++;
        loadLevel();
      }, 1000); // 1 saniye sonra diğer soru
    } else {
      btn.classList.add('wrong');
      setTimeout(() => {
        btn.classList.remove('wrong');
        allBtns.forEach(b => b.style.pointerEvents = 'auto'); // Hatalıysa tekrar seçme hakkı ver
      }, 500);
    }
  }

  // Oyunu Başlat
  loadLevel();
</script>

</body>
</html>
