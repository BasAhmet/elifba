<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyunlu Elif Ba Öğreniyorum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Çocuklar için eğlenceli ve yumuşak bir font */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; }
    </style>
</head>
<body class="bg-blue-50 min-h-screen p-6">

    <header class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-black text-blue-600 drop-shadow-sm">Harfleri Öğrenelim 🚀</h1>
        <p class="text-xl text-gray-600 mt-2 font-bold">Üzerlerine tıklayarak harflerin isimlerini öğren!</p>
    </header>

    <main>
        <div id="harfler-grid" class="grid grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-4 max-w-5xl mx-auto flex-row-reverse" dir="rtl">
            </div>
    </main>

    <script>
       // Elif Ba'nın tamamı ve ses dosyası isimleri
        const elifBa = [
            { arapca: "ا", okunus: "Elif", dosya: "elif", renk: "bg-red-400" },
            { arapca: "ب", okunus: "Be", dosya: "be", renk: "bg-orange-400" },
            { arapca: "ت", okunus: "Te", dosya: "te", renk: "bg-yellow-400" },
            { arapca: "ث", okunus: "Se", dosya: "se", renk: "bg-green-400" },
            { arapca: "ج", okunus: "Cim", dosya: "cim", renk: "bg-teal-400" },
            { arapca: "ح", okunus: "Ha", dosya: "ha", renk: "bg-cyan-400" },
            { arapca: "خ", okunus: "Hı", dosya: "hi", renk: "bg-blue-400" },
            { arapca: "د", okunus: "Dal", dosya: "dal", renk: "bg-indigo-400" },
            { arapca: "ذ", okunus: "Zel", dosya: "zel", renk: "bg-purple-400" },
            { arapca: "ر", okunus: "Ra", dosya: "ra", renk: "bg-pink-400" },
            { arapca: "ز", okunus: "Ze", dosya: "ze", renk: "bg-rose-400" },
            { arapca: "س", okunus: "Sin", dosya: "sin", renk: "bg-red-500" },
            { arapca: "ش", okunus: "Şın", dosya: "sin2", renk: "bg-orange-500" }, // Çakışmamak için sin2 yapılabilir
            { arapca: "ص", okunus: "Sad", dosya: "sad", renk: "bg-yellow-500" },
            { arapca: "ض", okunus: "Dat", dosya: "dat", renk: "bg-green-500" },
            { arapca: "ط", okunus: "Tı", dosya: "ti", renk: "bg-teal-500" },
            { arapca: "ظ", okunus: "Zı", dosya: "zi", renk: "bg-cyan-500" },
            { arapca: "ع", okunus: "Ayn", dosya: "ayn", renk: "bg-blue-500" },
            { arapca: "غ", okunus: "Ğayn", dosya: "gayn", renk: "bg-indigo-500" },
            { arapca: "ف", okunus: "Fe", dosya: "fe", renk: "bg-purple-500" },
            { arapca: "ق", okunus: "Kaf", dosya: "kaf", renk: "bg-pink-500" },
            { arapca: "ك", okunus: "Kef", dosya: "kef", renk: "bg-rose-500" },
            { arapca: "ل", okunus: "Lam", dosya: "lam", renk: "bg-red-400" },
            { arapca: "م", okunus: "Mim", dosya: "mim", renk: "bg-orange-400" },
            { arapca: "ن", okunus: "Nun", dosya: "nun", renk: "bg-yellow-400" },
            { arapca: "و", okunus: "Vav", dosya: "vav", renk: "bg-green-400" },
            { arapca: "ه", okunus: "He", dosya: "he", renk: "bg-teal-400" },
            { arapca: "لا", okunus: "Lam-Elif", dosya: "lam_elif", renk: "bg-cyan-400" },
            { arapca: "ي", okunus: "Ye", dosya: "ye", renk: "bg-blue-400" }
        ];

        const gridContainer = document.getElementById('harfler-grid');
        
        // Eşzamanlı ses çakışmalarını önlemek için global bir audio değişkeni tutuyoruz
        let aktifSes = null;

        // Harfleri ekrana basan fonksiyon
        elifBa.forEach(harf => {
            const button = document.createElement('button');
            button.className = `${harf.renk} text-white rounded-3xl p-6 shadow-lg transform transition-all duration-200 hover:scale-110 hover:shadow-2xl active:scale-95 flex flex-col items-center justify-center gap-2 relative overflow-hidden group`;
            
            button.innerHTML = `
                <span class="text-6xl font-bold leading-none mb-2 pointer-events-none">${harf.arapca}</span>
                <span class="text-xl font-bold opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-white text-gray-800 px-3 py-1 rounded-full absolute bottom-2 pointer-events-none">${harf.okunus}</span>
            `;
        
            button.addEventListener('click', () => {
                // Eğer o an çalan başka bir harf sesi varsa, onu sustur
                if (aktifSes) {
                    aktifSes.pause();
                    aktifSes.currentTime = 0;
                }
        
                // Yeni sesi oluştur ve çal
                const yeniSes = new Audio(`sesler/${harf.dosya}.mp3`);
                
                // Ses çalarken hata olursa (dosya yoksa) console'a yaz, sayfayı çökertme
                yeniSes.play().catch(error => {
                    console.warn(`Ses dosyası bulunamadı: sesler/${harf.dosya}.mp3`, error);
                });
        
                // Yeni sesi globale ata ki bir sonraki tıklamada kontrol edilebilsin
                aktifSes = yeniSes;
                
                // Tıklanan butona anlık ekstra bir görsel tepki (flaş etkisi) ver
                button.classList.add('opacity-75');
                setTimeout(() => button.classList.remove('opacity-75'), 150);
            });
        
            gridContainer.appendChild(button);
        });
    </script>
</body>
</html>
