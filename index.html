<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elif Ba Öğreniyorum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; }
        .shake-animation { animation: shake 0.3s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen p-6 flex flex-col items-center">

    <!-- Ana Menü / Navigasyon -->
    <header class="w-full max-w-5xl bg-white p-4 rounded-3xl shadow-sm border border-blue-100 mb-6 flex flex-col md:flex-row items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-black text-blue-600 drop-shadow-sm">Elif Ba 🚀</h1>
        </div>
        <div class="flex flex-wrap gap-2 justify-center items-center">
            <span class="bg-indigo-500 text-white font-bold py-3 px-6 rounded-2xl shadow">📖 Harfler & Harekeler</span>
            <a href="oyunlar.html" class="bg-emerald-500 text-white font-bold py-3 px-6 rounded-2xl shadow hover:scale-105 transition-all text-center">🎮 Oyun Odası</a>
        </div>
    </header>

    <!-- ÖĞRENME MODU ALANI (Harfler ve Harekeler) -->
    <div id="alan-ogrenme" class="w-full max-w-5xl flex flex-col items-center">
        <!-- Hareke Menüsü -->
        <div id="hareke-menu" class="w-full flex flex-wrap justify-center gap-3 mb-6 bg-white p-3 rounded-2xl shadow-sm border border-blue-100">
            <button onclick="harekeDegistir('yalin')" id="btn-yalin" class="hareke-btn bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-all hover:scale-105">Bağımsız Harfler</button>
            <button onclick="harekeDegistir('ustun')" id="btn-ustun" class="hareke-btn bg-gray-100 text-gray-600 font-bold py-3 px-6 rounded-xl transition-all hover:scale-105">Üstün ( َ )</button>
            <button onclick="harekeDegistir('esre')" id="btn-esre" class="hareke-btn bg-gray-100 text-gray-600 font-bold py-3 px-6 rounded-xl transition-all hover:scale-105">Esre ( ِ )</button>
            <button onclick="harekeDegistir('otre')" id="btn-otre" class="hareke-btn bg-gray-100 text-gray-600 font-bold py-3 px-6 rounded-xl transition-all hover:scale-105">Ötre ( ُ )</button>
            <button id="oyun-modu-btn" class="ml-auto bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all transform hover:scale-105 flex items-center gap-2">
                🎮 Bulma Oyunu
            </button>
        </div>
        
        <div id="oyun-geribildirim" class="hidden text-2xl font-black text-center mb-6 py-3 px-8 rounded-full shadow-md transition-all w-full max-w-3xl"></div>
        
        <div id="harfler-grid" class="grid grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-4 w-full flex-row-reverse" dir="rtl">
            <!-- JS ile doldurulacak -->
        </div>
    </div>

    <script>
        // --- 1. VERİ SETİ (Başta, Ortada, Sonda formları eklendi) ---
        const elifBa = [
            { arapca: "ا", yalin: "Elif", ustun: "E", esre: "İ", otre: "Ü", dosya: "elif", renk: "bg-red-400", basta: "ا", ortada: "ـا", sonda: "ـا" },
            { arapca: "ب", yalin: "Be", ustun: "Be", esre: "Bi", otre: "Bü", dosya: "be", renk: "bg-orange-400", basta: "بـ", ortada: "ـبـ", sonda: "ـب" },
            { arapca: "ت", yalin: "Te", ustun: "Te", esre: "Ti", otre: "Tü", dosya: "te", renk: "bg-yellow-400", basta: "تـ", ortada: "ـتـ", sonda: "ـت" },
            { arapca: "ث", yalin: "Se", ustun: "Se", esre: "Si", otre: "Sü", dosya: "se", renk: "bg-green-400", basta: "ثـ", ortada: "ـثـ", sonda: "ـث" },
            { arapca: "ج", yalin: "Cim", ustun: "Ce", esre: "Ci", otre: "Cü", dosya: "cim", renk: "bg-teal-400", basta: "جـ", ortada: "ـجـ", sonda: "ـج" },
            { arapca: "ح", yalin: "Ha", ustun: "Ha", esre: "Hı", otre: "Hu", dosya: "ha", renk: "bg-cyan-400", basta: "حـ", ortada: "ـحـ", sonda: "ـح" },
            { arapca: "خ", yalin: "Hı", ustun: "Ha", esre: "Hı", otre: "Hu", dosya: "hi", renk: "bg-blue-400", basta: "خـ", ortada: "ـخـ", sonda: "ـخ" },
            { arapca: "د", yalin: "Dal", ustun: "De", esre: "Di", otre: "Dü", dosya: "dal", renk: "bg-indigo-400", basta: "د", ortada: "ـد", sonda: "ـد" },
            { arapca: "ذ", yalin: "Zel", ustun: "Ze", esre: "Zi", otre: "Zü", dosya: "zel", renk: "bg-purple-400", basta: "ذ", ortada: "ـذ", sonda: "ـذ" },
            { arapca: "ر", yalin: "Ra", ustun: "Ra", esre: "Ri", otre: "Ru", dosya: "ra", renk: "bg-pink-400", basta: "ر", ortada: "ـر", sonda: "ـر" },
            { arapca: "ز", yalin: "Ze", ustun: "Ze", esre: "Zi", otre: "Zü", dosya: "ze", renk: "bg-rose-400", basta: "ز", ortada: "ـز", sonda: "ـز" },
            { arapca: "س", yalin: "Sin", ustun: "Se", esre: "Si", otre: "Sü", dosya: "sin", renk: "bg-red-500", basta: "سـ", ortada: "ـسـ", sonda: "ـس" },
            { arapca: "ش", yalin: "Şın", ustun: "Şe", esre: "Şi", otre: "Şü", dosya: "sin2", renk: "bg-orange-500", basta: "شـ", ortada: "ـشـ", sonda: "ـش" },
            { arapca: "ص", yalin: "Sad", ustun: "Sa", esre: "Sı", otre: "Su", dosya: "sad", renk: "bg-yellow-500", basta: "صـ", ortada: "ـصـ", sonda: "ـص" },
            { arapca: "ض", yalin: "Dat", ustun: "Da", esre: "Dı", otre: "Du", dosya: "dat", renk: "bg-green-500", basta: "ضـ", ortada: "ـضـ", sonda: "ـض" },
            { arapca: "ط", yalin: "Tı", ustun: "Ta", esre: "Tı", otre: "Tu", dosya: "ti", renk: "bg-teal-500", basta: "طـ", ortada: "ـطـ", sonda: "ـط" },
            { arapca: "ظ", yalin: "Zı", ustun: "Za", esre: "Zı", otre: "Zu", dosya: "zi", renk: "bg-cyan-500", basta: "ظـ", ortada: "ـظـ", sonda: "ـظ" },
            { arapca: "ع", yalin: "Ayn", ustun: "A", esre: "I", otre: "U", dosya: "ayn", renk: "bg-blue-500", basta: "عـ", ortada: "ـعـ", sonda: "ـع" },
            { arapca: "غ", yalin: "Ğayn", ustun: "Ğa", esre: "Ğı", otre: "Ğu", dosya: "gayn", renk: "bg-indigo-500", basta: "غـ", ortada: "ـغـ", sonda: "ـغ" },
            { arapca: "ف", yalin: "Fe", ustun: "Fe", esre: "Fi", otre: "Fü", dosya: "fe", renk: "bg-purple-500", basta: "فـ", ortada: "ـفـ", sonda: "ـف" },
            { arapca: "ق", yalin: "Kaf", ustun: "Ka", esre: "Kı", otre: "Ku", dosya: "kaf", renk: "bg-pink-500", basta: "قـ", ortada: "ـقـ", sonda: "ـق" },
            { arapca: "ك", yalin: "Kef", ustun: "Ke", esre: "Ki", otre: "Kü", dosya: "kef", renk: "bg-rose-500", basta: "كـ", ortada: "ـكـ", sonda: "ـك" },
            { arapca: "ل", yalin: "Lam", ustun: "Le", esre: "Li", otre: "Lü", dosya: "lam", renk: "bg-red-400", basta: "لـ", ortada: "ـلـ", sonda: "ـل" },
            { arapca: "م", yalin: "Mim", ustun: "Me", esre: "Mi", otre: "Mü", dosya: "mim", renk: "bg-orange-400", basta: "مـ", ortada: "ـمـ", sonda: "ـم" },
            { arapca: "ن", yalin: "Nun", ustun: "Ne", esre: "Ni", otre: "Nü", dosya: "nun", renk: "bg-yellow-400", basta: "نـ", ortada: "ـنـ", sonda: "ـن" },
            { arapca: "و", yalin: "Vav", ustun: "Ve", esre: "Vi", otre: "Vü", dosya: "vav", renk: "bg-green-400", basta: "و", ortada: "ـو", sonda: "ـو" },
            { arapca: "ه", yalin: "He", ustun: "He", esre: "Hi", otre: "Hü", dosya: "he", renk: "bg-teal-400", basta: "هـ", ortada: "ـهـ", sonda: "ـه" },
            { arapca: "لا", yalin: "Lam-Elif", ustun: "Lâ", esre: "Lî", otre: "Lû", dosya: "lam_elif", renk: "bg-cyan-400", basta: "لا", ortada: "ـلا", sonda: "ـلا" },
            { arapca: "ي", yalin: "Ye", ustun: "Ye", esre: "Yi", otre: "Yü", dosya: "ye", renk: "bg-blue-400", basta: "يـ", ortada: "ـيـ", sonda: "ـي" }
        ];

        // --- 2. GENEL SİSTEM FONKSİYONLARI ---
        let aktifSes = null;
        function sesCal(dosyaAdi) {
            if (aktifSes) { aktifSes.pause(); aktifSes.currentTime = 0; }
            aktifSes = new Audio(`sesler/${dosyaAdi}.mp3`);
            aktifSes.play().catch(e => console.warn("Ses çalınamadı", e));
        }

        // --- 5. ÖNCEKİ MODÜLLER İÇİN KODLAR (Harekeler ve Harf Bulma Oyunu) ---
        // (Burası bir önceki aşamadaki işlevleri aynen koruyor)
        const HAREKELER = { yalin: "", ustun: "\u064E", esre: "\u0650", otre: "\u064F" };
        const gridContainer = document.getElementById('harfler-grid');
        let aktifHareke = 'yalin';
        let oyunModu = false;
        let hedefHarfOgrenme = null;

        function harekeDegistir(harekeKodu) {
            aktifHareke = harekeKodu;
            document.querySelectorAll('.hareke-btn').forEach(btn => {
                btn.classList.replace('bg-blue-500', 'bg-gray-100');
                btn.classList.replace('text-white', 'text-gray-600');
            });
            const aktifBtn = document.getElementById(`btn-${harekeKodu}`);
            aktifBtn.classList.replace('bg-gray-100', 'bg-blue-500');
            aktifBtn.classList.replace('text-gray-600', 'text-white');
            if (oyunModu) yeniSoruSorOgrenme();
            ekraniCiz();
        }

        function getSesDosyasiAdi(harfDosya) {
            return aktifHareke === 'yalin' ? harfDosya : `${harfDosya}_${aktifHareke}`;
        }

        function yeniSoruSorOgrenme() {
            const rastgeleIndex = Math.floor(Math.random() * elifBa.length);
            hedefHarfOgrenme = elifBa[rastgeleIndex];
            const geribildirim = document.getElementById('oyun-geribildirim');
            geribildirim.className = "text-2xl font-black text-center mb-6 py-3 px-8 rounded-full shadow-md bg-blue-100 text-blue-700 animate-pulse w-full max-w-3xl";
            geribildirim.innerHTML = `👂 Sesini duyduğun harfi bul!`;
            setTimeout(() => sesCal(getSesDosyasiAdi(hedefHarfOgrenme.dosya)), 500);
        }

        document.getElementById('oyun-modu-btn').addEventListener('click', () => {
            const btn = document.getElementById('oyun-modu-btn');
            oyunModu = !oyunModu;
            if (oyunModu) {
                btn.innerHTML = "🛑 Oyunu Bitir";
                btn.classList.replace('bg-green-500', 'bg-red-500');
                btn.classList.replace('hover:bg-green-600', 'hover:bg-red-600');
                document.getElementById('oyun-geribildirim').classList.remove('hidden');
                yeniSoruSorOgrenme();
            } else {
                btn.innerHTML = "🎮 Bulma Oyunu";
                btn.classList.replace('bg-red-500', 'bg-green-500');
                btn.classList.replace('hover:bg-red-600', 'hover:bg-green-600');
                document.getElementById('oyun-geribildirim').classList.add('hidden');
                hedefHarfOgrenme = null;
            }
        });

        function ekraniCiz() {
            gridContainer.innerHTML = '';
            elifBa.forEach(harf => {
                const button = document.createElement('button');
                button.className = `${harf.renk} text-white rounded-3xl p-6 shadow-lg transform transition-all duration-200 hover:scale-110 hover:shadow-2xl active:scale-95 flex flex-col items-center justify-center gap-2 relative overflow-hidden group`;
                const gorselArapca = harf.arapca + HAREKELER[aktifHareke];
                const gorselOkunus = harf[aktifHareke];
                
                button.innerHTML = `
                    <span class="text-6xl font-bold leading-none mb-2 pointer-events-none">${gorselArapca}</span>
                    <span class="text-xl font-bold opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-white text-gray-800 px-3 py-1 rounded-full absolute bottom-2 pointer-events-none">${gorselOkunus}</span>
                `;

                button.addEventListener('click', () => {
                    if (!oyunModu) {
                        sesCal(getSesDosyasiAdi(harf.dosya));
                        button.classList.add('opacity-75');
                        setTimeout(() => button.classList.remove('opacity-75'), 150);
                    } else {
                        const geribildirim = document.getElementById('oyun-geribildirim');
                        if (harf.arapca === hedefHarfOgrenme.arapca) {
                            geribildirim.className = "text-2xl font-black text-center mb-6 py-3 px-8 rounded-full shadow-md bg-green-100 text-green-700 w-full max-w-3xl";
                            geribildirim.innerHTML = `🎉 Harika! Doğru bildin: ${gorselOkunus}`;
                            sesCal(getSesDosyasiAdi(harf.dosya));
                            button.classList.add('ring-4', 'ring-green-300', 'bg-green-500');
                            setTimeout(() => {
                                button.classList.remove('ring-4', 'ring-green-300', 'bg-green-500');
                                yeniSoruSorOgrenme();
                            }, 2000);
                        } else {
                            geribildirim.className = "text-2xl font-black text-center mb-6 py-3 px-8 rounded-full shadow-md bg-red-100 text-red-700 w-full max-w-3xl";
                            geribildirim.innerHTML = `❌ Tekrar dene!`;
                            button.classList.add('shake-animation', 'bg-gray-400');
                            sesCal(getSesDosyasiAdi(harf.dosya));
                            setTimeout(() => {
                                button.classList.remove('shake-animation', 'bg-gray-400');
                                setTimeout(() => sesCal(getSesDosyasiAdi(hedefHarfOgrenme.dosya)), 500);
                            }, 500);
                        }
                    }
                });
                gridContainer.appendChild(button);
            });
        }

        // İlk Yükleme
        ekraniCiz();
    </script>
</body>
</html>
